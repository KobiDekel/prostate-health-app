<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תוכנית שבועית - Gleason Care</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 font-sans pb-10">
    <div class="max-w-md mx-auto min-h-screen">
        <header class="bg-indigo-900 p-6 text-white rounded-b-3xl shadow-lg text-center">
            <h1 class="text-xl font-bold">תפריט שבועי מותאם</h1>
            <div id="day-selector" class="flex justify-between mt-4 overflow-x-auto gap-2 pb-2">
                </div>
        </header>

        <main class="p-5">
            <div id="loading" class="text-center py-10">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-900 mx-auto"></div>
                <p class="mt-4">בונה תוכנית ל-7 ימים...</p>
            </div>

            <div id="day-content" class="hidden">
                <div id="daily-tip-box" class="bg-amber-50 p-4 rounded-2xl border border-amber-200 mb-6 text-sm italic text-amber-900"></div>
                <div id="meals-container" class="space-y-4"></div>
            </div>
        </main>
    </div>

    <script>
        let weeklyPlan = [];

        async function init() {
            try {
                const res = await fetch('/api/server');
                const data = await res.json();
                weeklyPlan = data.weekly_plan;
                
                renderDaySelector();
                showDay(1);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('day-content').style.display = 'block';
            } catch (e) {
                alert("שגיאה בטעינת הנתונים");
            }
        }

        function renderDaySelector() {
            const selector = document.getElementById('day-selector');
            for(let i=1; i<=7; i++) {
                selector.innerHTML += `<button onclick="showDay(${i})" id="btn-day-${i}" class="bg-white/20 px-4 py-2 rounded-xl text-sm min-w-[60px]">יום ${i}</button>`;
            }
        }

        function showDay(dayNum) {
            const dayData = weeklyPlan.find(d => d.day_number === dayNum);
            if(!dayData) return;

            // עדכון כפתורים
            document.querySelectorAll('#day-selector button').forEach(b => b.classList.replace('bg-white', 'bg-white/20'));
            document.querySelectorAll('#day-selector button').forEach(b => b.classList.remove('text-indigo-900', 'font-bold'));
            const activeBtn = document.getElementById(`btn-day-${dayNum}`);
            activeBtn.classList.replace('bg-white/20', 'bg-white');
            activeBtn.classList.add('text-indigo-900', 'font-bold');

            document.getElementById('daily-tip-box').innerHTML = `<strong>💡 טיפ היום:</strong> ${dayData.daily_tip}`;
            
            const container = document.getElementById('meals-container');
            container.innerHTML = '';
            dayData.meals.forEach(meal => {
                container.innerHTML += `
                    <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                        <h3 class="font-bold text-indigo-800 border-b pb-2 mb-3">${meal.title}</h3>
                        <p class="text-xs mb-2"><strong>🧪 שילוב חומרים:</strong> ${meal.ingredients_logic}</p>
                        <p class="text-xs mb-2 text-red-600"><strong>🛡️ עיכוב סרטן:</strong> ${meal.cancer_inhibition}</p>
                        <p class="text-xs text-emerald-600"><strong>❤️ לב וכלי דם:</strong> ${meal.cardio_benefit}</p>
                    </div>
                `;
            });
        }

        init();
    </script>
</body>
</html>
