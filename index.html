<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gleason Care AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .meal-card { animation: fadeIn 0.5s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 font-sans pb-32">
    <div class="max-w-md mx-auto min-h-screen relative">
        <header class="bg-gradient-to-r from-blue-700 to-indigo-800 p-6 text-white rounded-b-[2rem] shadow-xl text-center">
            <h1 class="text-xl font-bold mb-1">התוכנית היומית שלי</h1>
            <p class="text-[10px] opacity-80 uppercase tracking-widest">מותאם אישית לגליסון 3+4</p>
            
            <div class="mt-4 bg-white/10 p-3 rounded-xl backdrop-blur-sm">
                <div class="w-full bg-gray-300/30 h-1.5 rounded-full overflow-hidden">
                    <div id="progress-bar" class="bg-green-400 h-full w-0 transition-all duration-700"></div>
                </div>
                <p class="text-[10px] mt-2 font-medium italic">הגנה על הלב, הכבד והערמונית</p>
            </div>
        </header>

        <div id="smart-notification" class="hidden p-3 mx-5 -mt-3 bg-amber-50 border border-amber-200 rounded-xl shadow-lg z-10 relative flex gap-3 items-center">
            <div class="text-amber-500 text-lg"><i class="fas fa-lightbulb"></i></div>
            <p id="notif-text" class="text-[11px] text-amber-900 font-medium"></p>
        </div>

        <main class="p-5 space-y-4">
            <div id="loading-spinner" class="text-center py-20">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-600 border-t-transparent"></div>
                <p class="text-xs text-slate-500 mt-4 font-bold">ה-AI בונה עבורך תפריט מבוסס מחקר...</p>
            </div>

            <div id="meals-list" class="space-y-4">
                </div>
        </main>

        <div id="success-summary" class="hidden fixed bottom-10 left-0 right-0 p-5 mx-5 bg-green-600 text-white rounded-2xl shadow-2xl text-center z-50">
            <h2 class="font-bold text-lg">כל הכבוד! 🏆</h2>
            <p id="summary-text" class="text-xs opacity-90"></p>
        </div>
    </div>

    <script>
        async function loadMenu() {
            const list = document.getElementById('meals-list');
            const spinner = document.getElementById('loading-spinner');
            
            try {
                // קריאה לשרת ה-API שלך ב-Vercel
                // הכתובת /api/server היא נתיב ברירת המחדל של Vercel עבור קבצי שרת
                const response = await fetch('/api/server?gleason=3+4');
                const data = await response.json();

                spinner.style.display = 'none';

                // הצגת הטיפ היומי
                if(data.daily_tip) {
                    document.getElementById('notif-text').innerText = data.daily_tip;
                    document.getElementById('smart-notification').classList.remove('hidden');
                }

                // עיבוד הארוחות מה-JSON שה-AI החזיר
                const mealKeys = ['morning', 'lunch', 'dinner']; // מותאם לפורמט ה-JSON הצפוי מהשרת
                const mealTitles = ['ארוחת בוקר', 'ארוחת צהריים', 'ארוחת ערב'];
                
                // במידה וה-AI החזיר מערך או אובייקט, נמפה אותו לממשק
                const menuItems = data.meals || [data.morning, data.lunch, data.dinner];

                menuItems.forEach((meal, index) => {
                    if(!meal) return;
                    list.innerHTML += `
                        <div class="meal-card bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                            <div class="flex items-center p-4 bg-slate-50/50 border-b">
                                <input type="checkbox" onchange="updateProgress()" class="w-6 h-6 rounded-full border-2 border-blue-300 text-blue-600">
                                <div class="mr-3">
                                    <span class="text-[9px] font-bold text-blue-600 uppercase tracking-widest">${mealTitles[index]}</span>
                                    <h3 class="font-bold text-slate-800 text-sm">${meal.title}</h3>
                                </div>
                            </div>
                            <div class="p-4 space-y-3">
                                <p class="text-[11px] text-slate-700 leading-relaxed italic"><strong class="text-red-500">🛡️ עיכוב סרטן:</strong> ${meal.cancer_inhibition}</p>
                                <hr class="opacity-30">
                                <p class="text-[11px] text-slate-700 leading-relaxed"><strong class="text-blue-500">❤️ מערכות הגוף:</strong> ${meal.systemic_benefit}</p>
                            </div>
                        </div>
                    `;
                });

            } catch (error) {
                console.error("Fetch error:", error);
                spinner.innerHTML = `<p class="text-red-500 text-xs font-bold">שגיאה בחיבור לשרת ה-AI. וודא שהגדרת API KEY.</p>`;
            }
        }

        function updateProgress() {
            const total = document.querySelectorAll('input[type="checkbox"]').length;
            const checked = Array.from(document.querySelectorAll('input[type="checkbox"]')).filter(c => c.checked).length;
            const percentage = (checked / total) * 100;
            document.getElementById('progress-bar').style.width = percentage + '%';
            
            if(checked === total) {
                document.getElementById('success-summary').classList.remove('hidden');
                document.getElementById('summary-text').innerText = "היום הגנת על הלב, הכבד והמוח. זרימת הדם במצב אופטימלי לעיכוב המחלה.";
                setTimeout(() => document.getElementById('success-summary').classList.add('hidden'), 5000);
            }
        }

        loadMenu();
    </script>
</body>
</html>
