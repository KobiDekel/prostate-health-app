<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תפריט תזונה מותאם אישית - Direct AI</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 20px; text-align: center; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; }
        #version-tag { color: #7f8c8d; font-size: 0.9em; margin-bottom: 20px; }
        .status-loading { color: #3498db; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #27ae60; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
    </style>
</head>
<body>

<div class="container">
    <h1>תפריט תזונה מבוסס AI</h1>
    <p id="version-tag">גרסה: 3.0 - מנוע AI ישיר</p>

    <div id="meal-plan-container">
        <p id="status-text" class="status-loading">הדפדפן מתחבר כעת ישירות לגוגל... זה לוקח כ-10 שניות.</p>
        <table id="meal-table" style="display:none;">
            <thead>
                <tr>
                    <th>יום</th>
                    <th>בוקר</th>
                    <th>צהריים</th>
                    <th>ערב</th>
                </tr>
            </thead>
            <tbody id="meal-body"></tbody>
        </table>
    </div>
</div>

<script>
    // המידע שהעלית מתוך sources.txt מוטמע כאן ישירות כבסיס ידע ל-AI
    const rawSources = `
        במקורות שסופקו מופיעים שמות של סרטונים רבים מיוטיוב וכן סרטון מתוך כתבה באתר "וואלה".
        הערה מיוחדת מהמקורות: לאכול רק ברוקולי סגול בשבת.
        סרטונים מרכזיים: Regrow Stem Cells, Cholesterol reduction (Dr. Ziv Ab), Cancer metabolic tricks, 
        Anti-cancer foods, Stem cells activation, Nitric Oxide boost, Mitochondrial health.
    `;

    async function generateMealPlan() {
        const statusText = document.getElementById('status-text');
        const table = document.getElementById('meal-table');
        const tableBody = document.getElementById('meal-body');
        
        // --- הזן כאן את המפתח שלך ---
        const API_KEY = "AIzaSyBMGJysQXclL8M4UemlzlNMffejjq0cQ8k"; 
        
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

        const prompt = {
            contents: [{
                parts: [{
                    text: `Based on these nutritional sources: ${rawSources}, create a 7-day meal plan for Gleason 3+4. 
                    Requirement: Saturday dinner must be ONLY "Purple Broccoli". 
                    Return ONLY a JSON array of objects with keys: "day", "breakfast", "lunch", "dinner".`
                }]
            }]
        };

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(prompt)
            });

            if (!response.ok) throw new Error("API Connection Failed");

            const data = await response.json();
            const rawResponseText = data.candidates[0].content.parts[0].text;
            
            // חילוץ JSON נקי
            const jsonStart = rawResponseText.indexOf('[');
            const jsonEnd = rawResponseText.lastIndexOf(']') + 1;
            const mealPlan = JSON.parse(rawResponseText.substring(jsonStart, jsonEnd));

            // הצגת הנתונים בטבלה
            tableBody.innerHTML = '';
            mealPlan.forEach(day => {
                const row = `<tr>
                    <td><strong>${day.day}</strong></td>
                    <td>${day.breakfast}</td>
                    <td>${day.lunch}</td>
                    <td>${day.dinner}</td>
                </tr>`;
                tableBody.innerHTML += row;
            });

            statusText.style.display = 'none';
            table.style.display = 'table';
            document.getElementById('version-tag').innerText = "גרסה: 3.0 - תפריט עודכן בהצלחה";

        } catch (error) {
            console.error("Error:", error);
            statusText.innerText = "שגיאה: " + error.message + ". וודא שה-API Key תקין.";
            statusText.style.color = "red";
        }
    }

    // הפעלה אוטומטית
    window.onload = generateMealPlan;
</script>

</body>
</html>
